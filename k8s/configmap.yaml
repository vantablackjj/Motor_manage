apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: motor-manage
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "/api"
  DB_HOST: "postgres-service" # Assuming a postgres service exists
  DB_PORT: "5432"
  DB_NAME: "Manage_Warehouse"
  DB_USER: "postgres"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  DB_SSL: "false"
  DATABASE_URL: "postgresql://postgres:password@postgres-service:5432/Manage_Warehouse"
  LOG_LEVEL: "info"
  LOG_FILE: "logs/app.log"
  CORS_ORIGIN: "https://motor-manage.duckdns.org,https://motor-manage.ddns.net,http://54.254.173.166:32031"
  VAPID_SUBJECT: "mailto:admin@motor-manage.com"
